#
# This is the canonical configuration for the `README.md`
# Run `make readme` to rebuild the `README.md`
#

# Name of this project
name: tasks

email:
  support: support@hadenlabs.com

# Logo for this project
# logo: docs/logo.png

# License of this project
license: "LGPL-3.0"

# Canonical GitHub repo
github_repo: hadenlabs/tasks

# Badges to display
badges:
  - name: Latest Release
    image: https://img.shields.io/github/release/hadenlabs/tasks
    url: https://github.com/hadenlabs/tasks/releases
  - name: Lint
    image: https://img.shields.io/github/workflow/status/hadenlabs/tasks/lint-code
    url: https://github.com/hadenlabs/tasks/actions?workflow=lint-code
  - name: CI
    image: https://img.shields.io/github/workflow/status/hadenlabs/tasks/ci
    url: https://github.com/hadenlabs/tasks/actions?workflow=ci
  - name: Test
    image: https://img.shields.io/github/workflow/status/hadenlabs/tasks/test
    url: https://github.com/hadenlabs/tasks/actions?workflow=test
  - name: pre-commit
    image: https://img.shields.io/badge/pre--commit-enabled-brightgreen?logo=pre-commit&logoColor=white
    url: https://github.com/pre-commit/pre-commit
  - name: Conventional Commits
    image: https://img.shields.io/badge/Conventional%20Commits-1.0.0-yellow
    url: https://conventionalcommits.org
  - name: KeepAChangelog
    image: https://img.shields.io/badge/changelog-Keep%20a%20Changelog%20v1.0.0-orange
    url: https://keepachangelog.com

requirements: |-

  This is a list of var environment requires:

    - `GITLAB_USER`: This is the GitLab USER.
    - `GITLAB_TOKEN`: This is the GitLab personal access token.
    - `TASK_X_REMOTE_TASKFILES=1`: Enabled Tasks Remote

  This is a list of plugins that need to be installed previously to enjoy all the goodies of this configuration:

  - [gomplate](https://github.com/hairyhenderson/gomplate)
  - [python](https://www.python.org)
  - [taskfile](https://github.com/go-task/task)

# Short description of this project
description: |-

  # 📦 Taskfile Templates Repository

  This repository contains reusable **Taskfile templates** to standardize and
  simplify common tasks like running pre-commit hooks, generating changelogs,
  creating GitHub releases, and more.

