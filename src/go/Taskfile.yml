version: "3"

env:
  GO_FILES:
    sh: find ./ -type f -name '*.go' | grep -v '/vendor/' | sort -u | xargs -n 100 true

tasks:
  check:
    desc: Exist go and dependences
    run: once
    deps:
      - task: check:go
      - task: check:gofmt
      - task: check:golangcilint
      - task: check:goreleaser

  check:go:
    desc: Check if Go is installed
    run: once
    preconditions:
      - sh: command -v go
        msg: |
          Go no está instalado. Instálalo con:
          curl -LO "https://go.dev/dl/go$(curl -s https://go.dev/VERSION?m=text).$(uname -s|tr '[:upper:]' '[:lower:]')-$(uname -m|sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" &&
          sudo rm -rf /usr/local/go &&
          sudo tar -C /usr/local -xzf go*.tar.gz &&
          rm go*.tar.gz &&
          echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.zshrc &&
          source ~/.zshrc &&
          go version

  check:gofmt:
    desc: Exist gofmt
    run: once
    preconditions:
      - sh: command -v gofmt
        msg: "Please Install gofmt"

  check:golangcilint:
    desc: Exist golangci-lint
    run: once
    preconditions:
      - sh: command -v golangci-lint
        msg: "Please Install golangci-lint"

  check:goreleaser:
    desc: Exist goreleaser
    run: once
    preconditions:
      - sh: command -v goreleaser
        msg: "Please Install goreleaser"

  check:mockery:
    desc: Check if mockery is installed
    run: once
    preconditions:
      - sh: command -v mockery
        msg: |
          Mockery no está instalado. Instálalo con:
          go install github.com/vektra/mockery/v2@latest &&
          mockery --version

  setup:
    desc: Setup go dependences.
    run: once
    cmds:
      - go mod download
      - go mod tidy
      - go mod vendor
      - go generate -v ./...
    deps:
      - task: check:go

  prettier:
    desc: format files go.
    run: once
    cmds:
      - task: fmt

  fmt:
    desc: format files go.
    run: once
    cmds:
      - gofmt -s -l -w {{.GO_FILES}}
    deps:
      - task: check:gofmt

  lint:
    desc: Run linter go.
    run: once
    cmds:
      - golangci-lint run --config .ci/linters/.golangci.yml
    deps:
      - task: check:golangcilint

  fix:
    desc: Fix lint violations.
    run: once
    cmds:
      - golangci-lint run --fix --config .ci/linters/.golangci.yml
    deps:
      - task: check:golangcilint

  vet:
    desc: Run go vet against code.
    run: once
    cmds:
      - go vet ./ ...
    deps:
      - task: check:go

  mockery:
    desc: Refreshes the mock implementations in ./mocks.
    cmds:
      - mockery --config .ci/config/mockery.yaml
    deps:
      - task: check:mockery

  generate:
    desc: "Generate code with Wire"
    cmds:
      - go get github.com/google/wire/cmd/wire
      - wire ./...

  test:
    desc: Run go test against code.
    run: once
    deps:
      - task: check:go
    cmds:
      - go test -race -v ./... -coverprofile cover.out -timeout 60m

  build:
    desc: Build go packages.
    run: once
    cmds:
      - goreleaser build --snapshot --rm-dist
    deps:
      - task: check:go
      - task: check:goreleaser
